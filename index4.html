<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Para Ti ❤️</title>

<style>

/* ===== Fondo estilo Minecraft ===== */

body {
    margin: 0;
    background: #000000;
    overflow: hidden;
    font-family: 'Courier New', monospace;
}

/* ===== PARTÍCULAS ===== */

.particle {

position:absolute;
width:4px;
height:4px;

background:white;

opacity:0.5;

animation: float 10s linear infinite;

}

@keyframes float {

from {
transform:translateY(100vh);
}

to {
transform:translateY(-10vh);
}

}
/* ===== CORAZÓN ===== */

#heart-container {

position:absolute;
top:50%;
left:50%;

transform:translate(-50%,-50%);

display:grid;

grid-template-columns:repeat(11,34px);
grid-template-rows:repeat(10,34px);

gap:2px;

cursor:pointer;

/* LATIDO */


}

/* LATIDO LENTO */

@keyframes heartbeat {

0% { transform: translate(-50%, -50%) scale(1); }

15% { transform: translate(-50%, -50%) scale(1.06); }

30% { transform: translate(-50%, -50%) scale(1); }

45% { transform: translate(-50%, -50%) scale(1.08); }

60% { transform: translate(-50%, -50%) scale(1); }

100% { transform: translate(-50%, -50%) scale(1); }

}


/* BLOQUES */

.block {

width:34px;
height:34px;

background:
repeating-linear-gradient(
45deg,
#ff0000,
#ff0000 4px,
#cc0000 4px,
#cc0000 8px
);

box-shadow:

inset -5px -5px 0 #770000,
inset 5px 5px 0 #ff6666,
0 0 12px red;

opacity:0;

animation: glow 1.5s infinite alternate;

}

@keyframes glow {

from {

box-shadow:
inset -5px -5px 0 #770000,
inset 5px 5px 0 #ff6666,
0 0 10px red;

}

to {

box-shadow:
inset -5px -5px 0 #770000,
inset 5px 5px 0 #ff8888,
0 0 18px red;

}

}
/* ===== RESPONSIVE PARA TELÉFONO ===== */

@media (max-width: 768px) {

#book-container {

width: 95vw;   /* ancho según pantalla */
height: 60vh;  /* altura proporcional */

}

.fixed,
.page {

padding: 10px;

font-size: 14px;

}

button {

padding: 10px 18px;

font-size: 14px;

}

#heart-container {

transform:
translate(-50%,-50%)
scale(0.6);

}

}
/* ===== LIBRO ===== */

#book-container {

position:absolute;

width:760px;
height:480px;

top:50%;
left:50%;

transform:
translate(-50%,-50%)
scale(0);

perspective:3000px; /* importante */

}

/* LIBRO */

.book {

position:relative;

width:100%;
height:100%;

transform-style: preserve-3d;

}

/* HOJAS */

.sheet {

position:absolute;

width:50%;   /* SOLO MEDIA HOJA */

height:100%;

right:0;     /* empieza desde el centro */

transform-origin:left;

transition: transform 1s ease;

transform-style: preserve-3d;
box-shadow:

-5px 0 10px rgba(0,0,0,0.4);

}


/* PÁGINAS */

.page {

position:absolute;

width:100%;
height:100%;

background:#f4e2b8;

border:6px solid #3e2a14;

padding:20px;

box-sizing:border-box;

backface-visibility:hidden;

overflow:hidden;

}

/* página izquierda fija */

.fixed {

left:0;

width:50%;

height:100%;

position:absolute;

background:#f4e2b8;

border:6px solid #3e2a14;

padding:20px;

box-sizing:border-box;

}

/* hojas */
/* DERECHA */

.right {

right:0;

border-left:none;

}

/* PARTE TRASERA */

.back {

transform: rotateY(180deg);

}

/* VOLTEAR */

.flipped {

transform: rotateY(-180deg);

box-shadow:

5px 0 15px rgba(0,0,0,0.5);

}
/* LÍNEA CENTRAL */

.book::before {

content:"";

position:absolute;

top:0;

left:50%;

width:6px;

height:100%;

background:#3e2a14;

transform:translateX(-50%);

z-index:20;

}

/* BOTONES */

button {

position:absolute;

bottom:10px;

padding:12px 25px;

font-size:16px;

background:#aa0000;

color:white;

border:none;

cursor:pointer;

z-index:999;

}

#prev { left:10px; }
#next { right:10px; }



/* ===== IMÁGENES EN PÁGINAS ===== */

.page img {

width: 100%;

height: 70%;

object-fit: cover;

border-radius: 10px;

margin-top: 10px;

box-shadow: 0 0 10px black;

}

/* VIDEO */

.page video {

width: 90%;

height: auto;

max-height: 55%;

display: block;

margin: 10px auto;

border-radius: 10px;

box-shadow: 0 0 10px black;

}

/* ===== CORAZONES FINALES ===== */

.heart {

position: fixed;

color: red;

font-size: 25px;

animation: fall 4s linear forwards;

}

@keyframes fall {

0% {

transform: translateY(100px);
transform: translateX(-700px);

opacity: 1;

}

100% {

transform: translateY(100vh);

opacity: 0;

}

}

/* ===== CONTENEDOR DE CORAZONES ===== */

#hearts-container {

position: fixed;

top: -270px;
left: 500px;

width: 100vw;
height: 100vh;

pointer-events: none;

z-index: 9999;

}
/* PÁGINA FIJA DERECHA */

.fixed-right {

right: 0;

width: 50%;

height: 100%;

position: absolute;

background: #f4e2b8;

border: 6px solid #3e2a14;

border-left: none;

padding: 20px;

box-sizing: border-box;

z-index: 0;

}
/* CONTENEDOR LISTA */

.yt-list {

margin-top: 15px;

display: flex;

flex-direction: column;

gap: 12px;

align-items: center;

}

/* BOTONES YOUTUBE */

.yt-btn {

position: static; /* IMPORTANTE */

padding: 12px 20px;

font-size: 16px;

background: #ff0000;

color: white;

border: none;

border-radius: 10px;

cursor: pointer;

width: 90%;

max-width: 300px;

box-shadow: 0 0 10px black;

transition: 0.3s;

}

.yt-btn:hover {

background: #cc0000;

transform: scale(1.05);

}
</style>
</head>

<body>
    <!-- PARTÍCULAS -->

<script>

for(let i=0;i<40;i++){

let p=document.createElement("div");

p.className="particle";

p.style.left=Math.random()*100+"vw";

p.style.animationDuration=
5+Math.random()*10+"s";

document.body.appendChild(p);

}

</script>

<!-- CORAZÓN -->

<div id="heart-container"></div>

<!-- LIBRO -->

<div id="book-container">

<div class="book" id="book">

<!-- PÁGINA IZQUIERDA FIJA -->

<div class="page left fixed">

<h2>Página 1</h2>

<p>
Aquí empieza tu historia ❤️
</p>

</div>
<!-- PÁGINA DERECHA FIJA FINAL -->

<div class="page right fixed-right">

<h2>Nuestras canciones ❤️</h2>

<p>
Estas canciones son para ti 🎵
</p>

<div class="yt-list">

<button class="yt-btn"
onclick="window.open('https://youtu.be/N8OPe_OTSO4?si=JL_Do3Z4tKqIxD0a','_blank')">

🎵 Canción 1 ❤️

</button>

<button class="yt-btn"
onclick="window.open('https://youtu.be/jpg2NP2D-3k?si=wqp8YqOUm9mhQYIA','_blank')">

🎵 Canción 2 💕

</button>

</div>
</div>

<!-- HOJA 1 -->

<div class="sheet">

<div class="page front">

<h2>Página 2</h2>

<p>
Aquí puedes poner una imagen.
</p>

</div>

<div class="page back">

<h2>Página 3</h2>

<p>
Más contenido aquí.
</p>

</div>

</div>

<!-- HOJA 2 -->

<div class="sheet">

<div class="page front">

<h2>Página 4</h2>

<p>
Otra página.
</p>

</div>

<div class="page back">

<h2>Página 5</h2>

<p>
Aquí puedes escribir más.
</p>

</div>

</div>

<!-- HOJA 3 -->

<div class="sheet">

<div class="page front">

<h2>Página 6</h2>

<p>
Final del mensaje ❤️
</p>

</div>

<div class="page back">

<h2>❤️</h2>

<video id="finalVideo"
controls
muted
loop>

<source src="video.mp4" type="video/mp4">

Tu navegador no soporta video.

</video>



</div>



</div>

<button id="prev">⬅</button>
<button id="next">➡</button>

</div>


<!-- MÚSICA -->

<audio id="music" loop>
<source src="Cancion.mp3" type="audio/mpeg">
</audio>

<audio id="pageSound">
<source src="page.mp3" type="audio/mpeg">
</audio>

<script>

/* ===== CORAZÓN ===== */

const pattern=[

"00110001100",
"01111011110",
"11111111111",
"11111111111",
"01111111110",
"00111111100",
"00011111000",
"00001110000",
"00000100000",
"00000000000"

];

const container=
document.getElementById("heart-container");

let blocks=[];

/* CREAR BLOQUES */

pattern.forEach(row=>{

row.split("").forEach(cell=>{

if(cell==="1"){

let block=
document.createElement("div");

block.classList.add("block");

container.appendChild(block);

blocks.push(block);

}

else{

container.appendChild(
document.createElement("div")
);

}

});

});

/* CONSTRUCCIÓN */

blocks.forEach((block,i)=>{

setTimeout(()=>{

block.style.opacity=1;

if(i===blocks.length-1){

container.style.animation=
"heartbeat 2.4s infinite";

}

},i*60);

});

/* CLICK EN CORAZÓN */

container.onclick=()=>{

container.style.animation="none";

container.style.transition="0.8s";

container.style.transform=
"translate(-50%,-50%) scale(0)";

setTimeout(()=>{

document
.getElementById("book-container")
.style.transition="1s";

document
.getElementById("book-container")
.style.transform=
"translate(-50%,-50%) scale(1)";

/* MÚSICA */

document
.getElementById("music")
.play();

},800);

};

/* ===== PÁGINAS ===== */

let sheets =
document.querySelectorAll(".sheet");

let current = 0;

const pageSound =
document.getElementById("pageSound");

/* ORDEN INICIAL */

sheets.forEach((sheet, i) => {

sheet.style.zIndex =
sheets.length - i;

});

/* ===== BOTÓN NEXT (ÚNICO Y CORREGIDO) ===== */

document
.getElementById("next")
.onclick = () => {

if (current < sheets.length) {

sheets[current]
.classList.add("flipped");

sheets[current]
.style.zIndex =
current;

current++;

pageSound.currentTime = 0;
pageSound.play();

}

/* ACTIVAR CORAZONES */

if (current === sheets.length) {

createHearts();

}

};

/* ===== BOTÓN PREV ===== */

document
.getElementById("prev")
.onclick = () => {

if (current > 0) {

current--;

sheets[current]
.classList.remove("flipped");

sheets[current]
.style.zIndex =
sheets.length - current;

pageSound.currentTime = 0;
pageSound.play();

}

};

/* ===== SWIPE EN TELÉFONO ===== */

let startX = 0;
let endX = 0;

const book =
document.getElementById("book");

book.addEventListener(
"touchstart",
(e) => {

startX =
e.touches[0].clientX;

});

book.addEventListener(
"touchend",
(e) => {

endX =
e.changedTouches[0].clientX;

handleSwipe();

});

function handleSwipe() {

let diff =
startX - endX;

/* IZQUIERDA */

if (diff > 50) {

if (current < sheets.length) {

sheets[current]
.classList.add("flipped");

sheets[current]
.style.zIndex =
current;

pageSound.currentTime = 0;
pageSound.play();

current++;

}

/* CORAZONES FINAL */

if (current === sheets.length) {

createHearts();

}

}

/* DERECHA */

if (diff < -50) {

if (current > 0) {

current--;

sheets[current]
.classList.remove("flipped");

sheets[current]
.style.zIndex =
sheets.length - current;

pageSound.currentTime = 0;
pageSound.play();

}

}

}

/* ===== CORAZONES FINALES ===== */

function createHearts() {

for (let i = 0; i < 30; i++) {

let heart =
document.createElement("div");

heart.innerHTML = "❤️";

heart.classList.add("heart");

heart.style.left =
Math.random() * 100 + "vw";

heart.style.animationDuration =
(2 + Math.random() * 3) + "s";

document
.getElementById("hearts-container")
.appendChild(heart);

setTimeout(() => {

heart.remove();

}, 5000);

}

}

</script>

<div id="hearts-container"></div>

</body>
</html>
